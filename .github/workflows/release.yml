name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '[release v1.0.54]')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v1.0.54' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complete installer
        run: |
          zip -r "anthbot-map-${RELEASE_TAG}.zip" \
            custom_components \
            www \
            examples \
            README.md \
            README_HU.md \
            CHANGELOG.md \
            CHANGELOG_v1.0.54_HU.md \
            LICENSE \
            NOTICE.md \
            hacs.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${RELEASE_TAG}" \
            "anthbot-map-${RELEASE_TAG}.zip" \
            --target "${GITHUB_SHA}" \
            --title "Anthbot Map ${RELEASE_TAG}" \
            --generate-notes
