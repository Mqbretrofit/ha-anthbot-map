name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build complete installer
        run: |
          zip -r "anthbot-map-${GITHUB_REF_NAME}.zip" \
            custom_components \
            www \
            examples \
            README.md \
            README_HU.md \
            CHANGELOG.md \
            CHANGELOG_v1.0.54_HU.md \
            LICENSE \
            NOTICE.md \
            hacs.json

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "anthbot-map-${GITHUB_REF_NAME}.zip" \
            --title "Anthbot Map ${GITHUB_REF_NAME}" \
            --generate-notes

